version: "3.8"

services:
  app:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile
    container_name: douyin-shop-app
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile
    container_name: douyin-shop-worker
    env_file:
      - ../backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=4

  beat:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile
    container_name: douyin-shop-beat
    env_file:
      - ../backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: celery -A app.core.celery_app beat --loglevel=info

  db:
    image: postgres:15-alpine
    container_name: douyin-shop-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-douyin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-douyin_secret}
      POSTGRES_DB: ${POSTGRES_DB:-douyin_shop}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-douyin}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: douyin-shop-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
