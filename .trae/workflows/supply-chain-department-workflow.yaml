workflow_id: supply_chain_department_workflow
name: 电商供应链部工作流
description: >
  用于 1688 货源查询、供应商比价、成本和物流风险判断。
  它是 `ecommerce_workflow` 内部的供应链 SOP。

department: 电商部门 / 供应链部
parent_workflow: ecommerce_workflow
minister_role: supplier-lookup-agent

entry_rules:
  semantic_intent:
    allowed: true
    classifier_agent: supplier-lookup-agent
    output_required:
      - intent_type
      - supply_chain_stage
      - workflow_match
      - routing_confidence
      - hard_exclusion_hit
    rule: 允许供应链入口角色用 LLM 判断找货、比价、物流风险或供应商确认阶段，但必须落成结构化字段。
  hard_triggers:
    - rule: parent_workflow == "ecommerce_workflow"
      route: supply_chain_department_workflow
    - rule: task_domain in ["supplier", "1688", "sourcing", "price_compare"]
      route: supply_chain_department_workflow
  hard_exclusions:
    - rule: catalog quality, product candidate, or listing readiness
      route: product_department_workflow
    - rule: copywriting, material, or detail page strategy
      route: content_material_department_workflow
    - rule: order exception or customer risk
      route: customer_risk_department_workflow

workflow_controller: ecommerce-orchestrator-agent

state_schema:
  - intent_type
  - supply_chain_stage
  - workflow_match
  - routing_confidence
  - hard_exclusion_hit
  - confirmed_candidate
  - supplier_result
  - cost_range
  - logistics_risk
  - supplier_decision

roles:
  - key: supply_chain_minister
    agent: supplier-lookup-agent
    responsibility: 供应商查询、比价、成本与物流风险判断
  - key: supplier_human_gate
    skill: human-gate-approval
    responsibility: 供应商关键选择需宿主确认时暂停

nodes:
  - key: supplier_lookup
    agent: supplier-lookup-agent
    role: supply_chain_minister
  - key: human_gate
    skill: human-gate-approval
    role: supplier_human_gate
  - key: archive
    skill: workflow-archive-report
    role: archive_skill

edges:
  - from: supplier_lookup
    to: human_gate
    when: supplier_confirmation_required == true
    input: [supplier_result, cost_range, logistics_risk]
    output: [decision_prompt]
  - from: supplier_lookup
    to: archive
    when: supplier_confirmation_required != true
    input: [supplier_result, cost_range, logistics_risk]
    output: [archive_record]
  - from: human_gate
    to: archive
    when: decision in ["continue_to_creative", "pause", "cancel", "change_plan"]
    input: [decision, supplier_result]
    output: [archive_record]

success_criteria:
  - supplier_result is not null
