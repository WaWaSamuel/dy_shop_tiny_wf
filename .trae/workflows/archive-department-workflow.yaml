workflow_id: archive_department_workflow
name: 经营档案复盘部工作流
description: >
  用于沉淀工作流输入、关键决策、人工确认、产物、终态和复盘线索。
  它不是一线执行流，而是一人公司的公司记忆与复盘 SOP。

department: 经营档案 / 复盘部
minister_role: process-archive-agent

entry_rules:
  semantic_intent:
    allowed: false
    classifier_agent: process-archive-agent
    output_required:
      - archive_reason
      - workflow_terminal_state
      - archive_allowed
    rule: 归档入口不依赖自由语义判断，只接受上游 workflow 的明确终态和归档请求。
  hard_triggers:
    - rule: workflow_terminal_state in ["completed", "paused", "cancelled", "blocked", "optimized", "accepted"]
      route: archive_department_workflow
  hard_exclusions:
    - rule: workflow_terminal_state is null or archive_allowed != true
      route: upstream_workflow

workflow_controller: process-archive-agent

context_policy:
  isolation_mode: soft
  policy_ref: .trae/policies/context-isolation-policy.md
  input_packet: handoff_packet
  result_packet: result_packet
  entry_role_responsibility: process-archive-agent
  handoff_rule: 归档入口只接收终态摘要、决策、人工确认、产物引用和复盘线索。
  return_rule: 归档完成后必须把 archive_record、final_status 和 replay_notes 压缩为 result_packet 回传上游。
  logging_rule: 归档日志只记录 packet_refs、artifact_refs 和终态，不记录完整上游上下文。

state_schema:
  - handoff_packet
  - result_packet
  - parent_packet_id
  - packet_refs
  - upstream_workflow
  - return_contract
  - archive_reason
  - archive_allowed
  - workflow_id
  - run_id
  - decisions
  - human_confirmations
  - artifacts
  - final_status
  - replay_notes

roles:
  - key: archive_minister
    agent: process-archive-agent
    responsibility: 定义归档口径、复盘线索和公司记忆结构
  - key: archive_executor
    skill: workflow-archive-report
    responsibility: 生成归档记录或可视化收口结果

nodes:
  - key: prepare_archive
    agent: process-archive-agent
    role: archive_minister
  - key: archive
    skill: workflow-archive-report
    role: archive_executor

edges:
  - from: prepare_archive
    to: archive
    when: final_status is not null
    input: [workflow_id, run_id, decisions, human_confirmations, artifacts, final_status]
    output: [archive_task]

success_criteria:
  - archive_record is not null
