workflow_id: function_qa_workflow
name: 技术开发部门功能 QA 工作流
description: >
  用于接口、流程、回归和功能正确性验证。它是 `development_workflow`
  内部的功能 QA SOP。

department: 技术开发部门 / 功能 QA
parent_workflow: development_workflow
minister_role: regression-validation-agent

entry_rules:
  semantic_intent:
    allowed: true
    classifier_agent: regression-validation-agent
    output_required:
      - intent_type
      - qa_scope
      - workflow_match
      - routing_confidence
      - hard_exclusion_hit
    rule: 允许功能 QA 入口角色用 LLM 判断回归、接口验证或主流程验证范围，但必须落成结构化 QA 字段。
  hard_triggers:
    - rule: parent_workflow == "development_workflow"
      route: function_qa_workflow
    - rule: task_domain in ["regression", "functional_qa", "api_validation", "flow_validation"]
      route: function_qa_workflow
  hard_exclusions:
    - rule: visual, interaction, or UI/UX review only
      route: effect_qa_workflow
    - rule: no development output or regression scope is provided
      route: development_workflow

workflow_controller: regression-validation-agent

state_schema:
  - intent_type
  - qa_scope
  - workflow_match
  - routing_confidence
  - hard_exclusion_hit
  - change_scope
  - api_status
  - page_status
  - regression_result
  - retest_signal

roles:
  - key: function_qa_minister
    agent: regression-validation-agent
    responsibility: 回归验证、功能正确性、接口与流程验收
  - key: host_acceptance
    agent: host-acceptance-agent
    responsibility: 宿主视角验收与是否收口判断

nodes:
  - key: regression
    agent: regression-validation-agent
    role: function_qa_minister
  - key: host_acceptance
    agent: host-acceptance-agent
    role: host_acceptance
  - key: archive
    skill: workflow-archive-report
    role: archive_skill

edges:
  - from: regression
    to: host_acceptance
    when: regression_passed == true
    input: [regression_result]
    output: [host_acceptance_request]
  - from: host_acceptance
    to: archive
    when: acceptance_passed == true
    input: [regression_result, host_acceptance_result]
    output: [archive_record]

success_criteria:
  - regression_passed == true
  - acceptance_passed == true
