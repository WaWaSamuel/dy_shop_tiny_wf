workflow_id: customer_risk_department_workflow
name: 电商客服风控部工作流
description: >
  用于异常订单、人工确认、暂停、取消、退款/发货/补偿建议和风险归档。
  它是 `ecommerce_workflow` 内部的客服风控 SOP。

department: 电商部门 / 客服风控部
parent_workflow: ecommerce_workflow
minister_role: exception-order-agent

entry_rules:
  semantic_intent:
    allowed: true
    classifier_agent: exception-order-agent
    output_required:
      - intent_type
      - risk_stage
      - workflow_match
      - routing_confidence
      - hard_exclusion_hit
    rule: 允许客服风控入口角色用 LLM 判断异常订单、售后风险或人工确认阶段，但必须落成结构化字段。
  hard_triggers:
    - rule: parent_workflow == "ecommerce_workflow"
      route: customer_risk_department_workflow
    - rule: task_domain in ["order_exception", "risk", "customer_service"]
      route: customer_risk_department_workflow
  hard_exclusions:
    - rule: catalog, candidate, sourcing, material, or listing preparation without customer/order risk
      route: ecommerce_workflow
    - rule: irreversible business action without human confirmation
      route: human_gate

workflow_controller: ecommerce-orchestrator-agent

context_policy:
  isolation_mode: soft
  policy_ref: .trae/policies/context-isolation-policy.md
  input_packet: handoff_packet
  result_packet: result_packet
  entry_role_responsibility: exception-order-agent
  handoff_rule: 客服风控入口只接收异常订单摘要、物流状态、处理历史引用和人工确认约束。
  return_rule: 风控处理结束后必须把建议、风险、人工确认结论压缩为 result_packet 回传 ecommerce_workflow。
  logging_rule: 不记录完整订单隐私数据，只记录 packet_refs、风险摘要和决策状态。

state_schema:
  - handoff_packet
  - result_packet
  - parent_packet_id
  - packet_refs
  - upstream_workflow
  - return_contract
  - intent_type
  - risk_stage
  - workflow_match
  - routing_confidence
  - hard_exclusion_hit
  - order_exception
  - logistics_state
  - exception_result
  - human_decision
  - final_status

roles:
  - key: customer_risk_minister
    agent: exception-order-agent
    responsibility: 异常订单判断、处理建议、风险摘要
  - key: risk_human_gate
    skill: human-gate-approval
    responsibility: 退款、发货、补偿、取消等高风险动作确认

nodes:
  - key: exception_order
    agent: exception-order-agent
    role: customer_risk_minister
  - key: human_gate
    skill: human-gate-approval
    role: risk_human_gate
  - key: archive
    skill: workflow-archive-report
    role: archive_skill

edges:
  - from: exception_order
    to: human_gate
    when: exception_confirmation_required == true
    input: [exception_result]
    output: [decision_prompt]
  - from: exception_order
    to: archive
    when: exception_confirmation_required != true
    input: [exception_result]
    output: [archive_record]
  - from: human_gate
    to: archive
    when: decision in ["continue", "pause", "cancel", "change_plan"]
    input: [decision, exception_result]
    output: [archive_record]

success_criteria:
  - exception_result is not null
