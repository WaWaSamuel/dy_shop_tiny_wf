services:
  # ==================== 数据库 ====================
  postgres:
    image: postgres:16-alpine
    container_name: studio-postgres
    environment:
      POSTGRES_DB: studio_main
      POSTGRES_USER: studio
      POSTGRES_PASSWORD: studio_password_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studio -d studio_main"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: studio-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==================== 后端 API ====================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: studio-backend
    environment:
      - APP_NAME=Personal Studio
      - DEBUG=true
      - DATABASE_URL=postgresql+asyncpg://studio:studio_password_2024@postgres:5432/studio_main
      - DATABASE_READ_URL=postgresql+asyncpg://studio:studio_password_2024@postgres:5432/studio_main
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - JWT_SECRET_KEY=your-super-secret-key-change-in-production
      - CORS_ORIGINS=["http://localhost:5174","http://localhost:5173","http://localhost:3000"]
      - FEISHU_BOT_ENABLED=${FEISHU_BOT_ENABLED:-false}
      - FEISHU_APP_ID=${FEISHU_APP_ID:-}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET:-}
      - FEISHU_BASE_DOMAIN=${FEISHU_BASE_DOMAIN:-https://open.feishu.cn}
      - FEISHU_BOT_TARGET_OPEN_ID=${FEISHU_BOT_TARGET_OPEN_ID:-}
      - FEISHU_BOT_OWNER_ID=${FEISHU_BOT_OWNER_ID:-}
      - FEISHU_BOT_DEFAULT_CHAT_ID=${FEISHU_BOT_DEFAULT_CHAT_ID:-}
      - FEISHU_BOT_PUSH_TOKEN=${FEISHU_BOT_PUSH_TOKEN:-}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ==================== Celery Worker ====================
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: studio-celery-worker
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4 -Q default,creative,sync,notification
    environment:
      - DATABASE_URL=postgresql+asyncpg://studio:studio_password_2024@postgres:5432/studio_main
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ==================== Celery Beat (定时任务) ====================
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: studio-celery-beat
    command: celery -A app.tasks.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://studio:studio_password_2024@postgres:5432/studio_main
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ==================== 前端 ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: studio-frontend
    environment:
      - VITE_PROXY_TARGET=http://backend:8000
    ports:
      - "5174:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
